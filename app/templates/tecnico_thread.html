{% extends "base.html" %}
{% block titulo %}Chamado #{{ chamado.id }} - Painel do técnico{% endblock %}
{% block estilo_extra %}
<style>
  .pagina-chat {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    background: var(--bg);
    padding: 16px;
  }
  .janela-chat {
    width: 100%;
    max-width: 680px;
    display: flex;
    flex-direction: column;
    height: calc(100dvh - 32px);
    background: var(--bg);
    border: 1px solid var(--borda-fraca);
    border-radius: 16px;
    box-shadow: 0 20px 50px -12px rgba(0,0,0,.6);
    overflow: hidden;
    position: relative;
  }

  .cabecalho {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--borda-fraca);
    flex-wrap: wrap;
  }
  .cabecalho-info { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .cabecalho-avatar {
    width: 34px;
    height: 34px;
    border-radius: 9px;
    background: var(--teal);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .cabecalho-avatar svg { width: 18px; height: 18px; color: #08221d; }
  .cabecalho-info strong {
    display: block;
    font: 700 14px 'Inter', sans-serif;
    color: var(--texto-forte);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cabecalho-info .subtitulo { font: 400 11px 'Inter', sans-serif; color: var(--texto-fraco); }
  .cabecalho-acoes { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .pill-status {
    font: 600 11.5px 'Inter', sans-serif;
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--superficie-forte);
    color: var(--texto-suave);
    white-space: nowrap;
  }
  .pill-status.status-aguardando { background: var(--status-aguardando-bg); color: var(--status-aguardando-texto); }
  .pill-status.status-atendimento { background: var(--status-atendimento-bg); color: var(--status-atendimento-texto); }
  .pill-status.status-resolvido { background: var(--status-resolvido-bg); color: var(--status-resolvido-texto); }
  .pill-status.status-fechado { background: var(--status-fechado-bg); color: var(--status-fechado-texto); }
  .botao-assumir-header, .botao-resolver-header { font-size: 11.5px; padding: 7px 12px; border-radius: 8px; }

  .historico { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; }
  .linha-mensagem { display: flex; flex-direction: column; width: 100%; }

  .divisor-sistema {
    align-self: center;
    font-size: .78rem;
    color: var(--texto-fraco);
    text-align: center;
    font-style: italic;
    margin: 10px auto 16px;
    max-width: 90%;
  }

  .grupo-mensagem { display: flex; flex-direction: column; max-width: 82%; margin-top: 4px; }
  .grupo-mensagem.novo-grupo { margin-top: 20px; }
  .grupo-mensagem.colaborador { align-self: flex-start; align-items: flex-start; }
  .grupo-mensagem.tecnico { align-self: flex-end; align-items: flex-end; max-width: 78%; }

  .rotulo-autor {
    display: flex;
    align-items: center;
    gap: 6px;
    font: 600 11.5px 'Inter', sans-serif;
    color: var(--texto-fraco);
    margin-bottom: 6px;
  }
  .grupo-mensagem.tecnico .rotulo-autor { color: var(--teal-texto); }

  .bolha {
    padding: 14px 16px;
    border-radius: 14px 14px 14px 4px;
    line-height: 1.6;
    font: 400 13px 'Inter', sans-serif;
    color: var(--texto);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .bolha strong { color: var(--texto-forte); font-weight: 600; }
  .grupo-mensagem.colaborador .bolha { background: var(--superficie-forte); border: 1px solid var(--borda); }
  .grupo-mensagem.tecnico .bolha {
    background: var(--teal-bg);
    border: 1px solid var(--teal-borda);
    border-radius: 14px 14px 4px 14px;
  }
  .grupo-mensagem.tecnico.privada .bolha {
    background: var(--nota-bg);
    border: 1px solid var(--nota-borda);
  }
  .rotulo-nota-privada {
    display: inline-block;
    font: 700 10px 'Inter', sans-serif;
    letter-spacing: .03em;
    text-transform: uppercase;
    color: var(--nota-texto);
    margin-bottom: 4px;
  }

  .timestamp { font-size: .72rem; color: var(--texto-minimo); margin-top: 5px; padding: 0 3px; }

  .card-resolvido {
    align-self: center;
    width: 100%;
    max-width: 92%;
    border-radius: 14px;
    padding: 14px 16px;
    margin: 16px auto;
    background: var(--verde-bg);
    border: 1px solid var(--verde-borda);
  }
  .card-resolvido-titulo {
    display: flex;
    align-items: center;
    gap: 6px;
    font: 700 12px 'Inter', sans-serif;
    color: var(--verde);
    margin-bottom: 8px;
  }
  .card-resolvido-texto { font: 400 13px/1.6 'Inter', sans-serif; color: var(--texto); white-space: pre-wrap; }

  @media (prefers-reduced-motion: no-preference) {
    .grupo-mensagem, .card-resolvido { animation: entrada .2s ease-out; }
  }
  @keyframes entrada {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .form-resolver {
    border-top: 1px solid var(--borda-fraca);
    padding: 14px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: var(--superficie-fraca);
  }
  .form-resolver textarea {
    width: 100%;
    min-height: 70px;
    padding: 10px 12px;
    border: 1px solid var(--borda-forte);
    border-radius: 8px;
    background: var(--superficie-fraca);
    color: var(--texto-forte);
    font: 400 13px 'Inter', sans-serif;
    resize: vertical;
  }
  .form-resolver textarea:focus {
    outline: none;
    border-color: var(--azul);
    box-shadow: 0 0 0 3px rgba(76,141,255,.18);
  }
  .form-resolver .linha-botoes { margin-top: 0; }
  .form-resolver-erro { font-size: .78rem; color: var(--erro-texto); }

  .rodape-chat {
    border-top: 1px solid var(--borda-fraca);
    padding: 16px 20px calc(16px + env(safe-area-inset-bottom));
    display: flex;
    gap: 8px;
    background: var(--bg);
  }
  .rodape-chat input[type=text] { flex: 1; height: 42px; border-radius: 10px; }
  .rodape-chat button { flex-shrink: 0; padding: 0 14px; height: 42px; border-radius: 10px; font-size: 12px; }

  .aviso-somente-leitura {
    padding: 14px 20px calc(14px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--borda-fraca);
    text-align: center;
    font-size: .85rem;
    color: var(--texto-fraco);
  }
</style>
{% endblock %}
{% block conteudo %}
<div class="pagina-chat"
     x-data="tecnicoThread({{ mensagens_iniciais_json }}, {{ chamado_json }}, {{ tecnico_atribuido_json }}, {{ 'true' if somente_leitura else 'false' }}, {{ total_mensagens_iniciais }})"
     x-init="iniciarStream()">
  <div class="janela-chat">

    <header class="cabecalho">
      <div class="cabecalho-info">
        <a class="botao-icone" href="/tecnico" aria-label="Painel do técnico">←</a>
        <div class="cabecalho-avatar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 13v-1a8 8 0 0 1 16 0v1"/>
            <rect x="2" y="13" width="5" height="7" rx="1.5"/>
            <rect x="17" y="13" width="5" height="7" rx="1.5"/>
          </svg>
        </div>
        <div style="min-width:0">
          <strong>Chamado #{{ chamado.id }}</strong>
          <span class="subtitulo" x-text="tecnicoAtribuido ? ('Atribuído a ' + tecnicoAtribuido) : 'Ninguém assumiu ainda'"></span>
        </div>
      </div>
      <div class="cabecalho-acoes">
        <span class="pill-status" :class="'status-' + statusClasse()" x-text="statusTexto()"></span>
        <button type="button" class="secundario botao-assumir-header" x-show="!tecnicoAtribuido && !somenteLeitura"
                :disabled="assumindo" @click="assumir()" x-text="assumindo ? 'Assumindo...' : 'Assumir'"></button>
        <button type="button" class="secundario botao-resolver-header" x-show="!somenteLeitura && chamado.status !== 5"
                @click="mostrarFormResolver = !mostrarFormResolver">Resolver</button>
      </div>
    </header>

    <div class="historico" x-ref="historico">
      <template x-for="(m, i) in mensagens" :key="m._id">
        <div class="linha-mensagem">
          <template x-if="m.tipo === 'sistema'">
            <div class="divisor-sistema" x-text="m.texto"></div>
          </template>

          <template x-if="m.tipo === 'colaborador' || m.tipo === 'tecnico'">
            <div class="grupo-mensagem" :class="[m.tipo, m.privado ? 'privada' : '', m.mostrarRotulo ? 'novo-grupo' : '']">
              <div class="rotulo-autor" x-show="m.mostrarRotulo">
                <span x-text="m.tipo === 'tecnico' ? (m.autorNome || 'Suporte') : 'Colaborador'"></span>
              </div>
              <span class="rotulo-nota-privada" x-show="m.privado">Nota interna</span>
              <div class="bolha" x-show="m.texto" x-html="formatarTexto(m.texto)"></div>
              <span class="timestamp" x-show="m.hora" x-text="m.hora"></span>
            </div>
          </template>

          <template x-if="m.tipo === 'solucao'">
            <div class="card-resolvido">
              <div class="card-resolvido-titulo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" width="13" height="13">
                  <path d="M20 6 9 17l-5-5"/>
                </svg>
                Solução registrada
              </div>
              <div class="card-resolvido-texto" x-text="m.texto"></div>
            </div>
          </template>
        </div>
      </template>
    </div>

    <div class="form-resolver" x-show="mostrarFormResolver">
      <label style="margin-bottom:0">Descreve a solução aplicada</label>
      <textarea x-model="textoSolucao" placeholder="O que foi feito pra resolver..."></textarea>
      <span class="form-resolver-erro" x-show="erroResolver" x-text="erroResolver"></span>
      <div class="linha-botoes">
        <button type="button" class="secundario" @click="mostrarFormResolver = false; textoSolucao = ''">Cancelar</button>
        <button type="button" class="primario" :disabled="resolvendo || textoSolucao.trim().length < 10"
                @click="resolver()" x-text="resolvendo ? 'Enviando...' : 'Confirmar solução'"></button>
      </div>
    </div>

    <div class="rodape-chat" x-show="!somenteLeitura && !mostrarFormResolver">
      <input type="text" x-model="textoMensagem" placeholder="Escreve uma resposta ou nota..."
             :disabled="enviando" @keydown.enter="enviar(false)">
      <button type="button" class="secundario" :disabled="enviando || !textoMensagem.trim()" @click="enviar(true)">Nota</button>
      <button type="button" class="primario" :disabled="enviando || !textoMensagem.trim()" @click="enviar(false)">Responder</button>
    </div>
    <div class="aviso-somente-leitura" x-show="somenteLeitura">Este chamado está fechado - só leitura.</div>
  </div>
</div>

<script>
function tecnicoThread(mensagensIniciais, chamadoInicial, tecnicoAtribuidoInicial, somenteLeituraInicial, totalMensagensIniciais) {
  const comId = (mensagensIniciais || []).map((m, i) => Object.assign({ _id: i }, m));
  return {
    mensagens: comId,
    _proximoId: comId.length,
    chamado: chamadoInicial,
    tecnicoAtribuido: tecnicoAtribuidoInicial,
    somenteLeitura: somenteLeituraInicial,
    textoMensagem: '',
    enviando: false,
    assumindo: false,
    mostrarFormResolver: false,
    textoSolucao: '',
    resolvendo: false,
    erroResolver: null,

    statusTexto() {
      const mapa = { 1: 'Novo', 2: 'Em atendimento', 3: 'Em atendimento', 4: 'Pendente', 5: 'Resolvido', 6: 'Fechado' };
      return mapa[this.chamado.status] || '';
    },
    statusClasse() {
      if (this.chamado.status === 6) return 'fechado';
      if (this.chamado.status === 5) return 'resolvido';
      if (this.tecnicoAtribuido) return 'atendimento';
      return 'aguardando';
    },

    formatarTexto(texto) {
      const escapado = (texto || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      return escapado.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    },

    pushMensagem(msg) {
      this.mensagens.push(Object.assign({ _id: this._proximoId++ }, msg));
      this.$nextTick(() => {
        if (this.$refs.historico) this.$refs.historico.scrollTop = this.$refs.historico.scrollHeight;
      });
    },

    // desde=totalMensagensIniciais: a pagina ja renderizou o historico
    // completo no carregamento - o SSE so manda o que aconteceu DEPOIS
    // disso, senao a primeira mensagem duplicaria tudo que ja esta na tela.
    iniciarStream() {
      const fonte = new EventSource('/tecnico/chamados/' + this.chamado.id + '/eventos?desde=' + totalMensagensIniciais);
      fonte.onmessage = (msg) => {
        const evento = JSON.parse(msg.data);
        if (evento.tipo === 'mensagem') {
          this.pushMensagem(evento.mensagem);
        } else if (evento.tipo === 'status') {
          this.chamado.status = evento.chamado.status;
          if (evento.chamado.status === 6) {
            this.somenteLeitura = true;
            fonte.close();
          }
        }
      };
    },

    async assumir() {
      this.assumindo = true;
      try {
        const resp = await fetch('/tecnico/chamados/' + this.chamado.id + '/assumir', { method: 'POST' });
        const dados = await resp.json();
        if (dados.ok) {
          this.tecnicoAtribuido = 'você';
        } else {
          alert(dados.erro || 'Não consegui assumir agora. Tenta de novo.');
        }
      } catch (e) {
        alert('Não consegui falar com o servidor agora. Tenta de novo.');
      } finally {
        this.assumindo = false;
      }
    },

    async enviar(privado) {
      const texto = this.textoMensagem.trim();
      if (!texto) return;
      this.enviando = true;
      try {
        const rota = privado ? 'nota' : 'responder';
        const corpo = new URLSearchParams({ mensagem: texto });
        const resp = await fetch('/tecnico/chamados/' + this.chamado.id + '/' + rota, {
          method: 'POST', body: corpo,
        });
        const dados = await resp.json();
        if (dados.ok) {
          this.textoMensagem = '';
          // a mensagem aparece via SSE em ate uns segundos - nao empurra
          // aqui pra nao duplicar quando o SSE tambem a entregar.
        } else {
          alert(dados.erro || 'Não consegui enviar agora. Tenta de novo.');
        }
      } catch (e) {
        alert('Não consegui falar com o servidor agora. Tenta de novo.');
      } finally {
        this.enviando = false;
      }
    },

    async resolver() {
      const texto = this.textoSolucao.trim();
      if (texto.length < 10) return;
      this.resolvendo = true;
      this.erroResolver = null;
      try {
        const corpo = new URLSearchParams({ solucao: texto });
        const resp = await fetch('/tecnico/chamados/' + this.chamado.id + '/resolver', {
          method: 'POST', body: corpo,
        });
        const dados = await resp.json();
        if (dados.ok) {
          this.mostrarFormResolver = false;
          this.textoSolucao = '';
        } else {
          this.erroResolver = dados.erro || 'Não consegui resolver agora. Tenta de novo.';
        }
      } catch (e) {
        this.erroResolver = 'Não consegui falar com o servidor agora. Tenta de novo.';
      } finally {
        this.resolvendo = false;
      }
    },
  };
}
</script>
{% endblock %}
