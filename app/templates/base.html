<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% block titulo %}Suporte de TI - CEDEP{% endblock %}</title>
  <script src="/static/vendor/htmx.min.js"></script>
  <script src="/static/vendor/alpine.min.js" defer></script>
  <style>
    /* Fontes vendorizadas localmente (sem CDN em tempo de execucao) -
       Inter e JetBrains Mono sao fontes variaveis: 1 arquivo cobre todos
       os pesos usados (400-800), so precisamos de latin + latin-ext pra
       cobrir os acentos do pt-BR. */
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 100 900;
      font-display: swap;
      src: url('/static/fonts/inter-latin.woff2') format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 100 900;
      font-display: swap;
      src: url('/static/fonts/inter-latin-ext.woff2') format('woff2');
      unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
    }
    @font-face {
      font-family: 'JetBrains Mono';
      font-style: normal;
      font-weight: 100 800;
      font-display: swap;
      src: url('/static/fonts/jetbrains-mono-latin.woff2') format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }
    @font-face {
      font-family: 'JetBrains Mono';
      font-style: normal;
      font-weight: 100 800;
      font-display: swap;
      src: url('/static/fonts/jetbrains-mono-latin-ext.woff2') format('woff2');
      unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
    }

    :root {
      color-scheme: dark;
      /* fundo */
      --bg: #0a0e18;
      --bg-radial: radial-gradient(120% 100% at 50% 0%, #111a2c 0%, #0a0e18 60%);
      /* superficie (cards, bolhas, inputs) */
      --superficie: rgba(255,255,255,.035);
      --superficie-forte: rgba(255,255,255,.05);
      --superficie-fraca: rgba(255,255,255,.03);
      --borda: rgba(255,255,255,.07);
      --borda-forte: rgba(255,255,255,.09);
      --borda-fraca: rgba(255,255,255,.06);
      /* texto */
      --texto: #e8ecf4;
      --texto-forte: #f1f4fa;
      --texto-suave: #8993a8;
      --texto-fraco: #7a8496;
      --texto-minimo: #5c6579;
      /* accent - unica cor de destaque (acao, links, ticket IDs) */
      --azul: #4c8dff;
      --azul-escuro: #3566d6;
      --azul-link: #5f9aff;
      --azul-gradiente: linear-gradient(135deg, #4c8dff, #3566d6);
      --azul-glow: 0 8px 24px -6px rgba(76,141,255,.5);
      --azul-glow-forte: 0 10px 26px -8px rgba(76,141,255,.55);
      /* suporte humano - leve toque de identidade propria (avatar/badge),
         nunca a bolha inteira (isso segue o padrao "assistente" comum) */
      --teal: #2dd4bf;
      --teal-texto: #5eead4;
      --teal-bg: rgba(45,212,191,.12);
      --teal-borda: rgba(45,212,191,.3);
      /* status de chamado - uma cor por estado, sempre a mesma em qualquer tela */
      --status-aguardando-texto: #f5a623;
      --status-aguardando-bg: rgba(245,166,35,.12);
      --status-atendimento-texto: #5f9aff;
      --status-atendimento-bg: rgba(95,154,255,.12);
      --status-resolvido-texto: #34d399;
      --status-resolvido-bg: rgba(52,211,153,.1);
      --status-fechado-texto: #7a8496;
      --status-fechado-bg: rgba(255,255,255,.05);
      /* verde (sucesso/confirmacao - chamado aberto, resolvido) */
      --verde: #34d399;
      --verde-bg: rgba(52,211,153,.1);
      --verde-borda: rgba(52,211,153,.25);
      /* erro - reserva SO pra formulario (login invalido, validacao) */
      --erro-texto: #ff6b6b;
      --erro-bg: rgba(255,107,107,.1);
      --erro-borda: rgba(255,107,107,.3);
      /* nota interna (painel do tecnico, Fase 6) - so pra distinguir
         visualmente followup privado de publico, nunca aparece pro
         colaborador */
      --nota-texto: #e8b339;
      --nota-bg: rgba(232,179,57,.1);
      --nota-borda: rgba(232,179,57,.3);
      /* legado: mantidos pra nao quebrar templates ainda nao migrados */
      --cinza-bg: var(--bg);
      --cinza-borda: var(--borda);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, ui-sans-serif, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      background: var(--bg);
      color: var(--texto);
    }
    .pagina {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg-radial);
    }
    .cartao {
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border: 1px solid var(--borda-forte);
      border-radius: 18px;
      padding: 36px 32px;
      max-width: 360px;
      width: 100%;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 0 1px rgba(76,141,255,.05), 0 30px 60px -20px rgba(0,0,0,.7);
    }
    .cartao .logo { height: 34px; width: auto; object-fit: contain; margin-bottom: 22px; filter: brightness(1.15); }
    .cartao h1 {
      font: 700 20px/1.3 'Inter', sans-serif;
      color: var(--texto-forte);
      margin: 0 0 6px;
    }
    .cartao p.subtitulo {
      color: var(--texto-suave);
      margin: 0 0 26px;
      font: 400 13px/1.5 'Inter', sans-serif;
    }
    label {
      display: block;
      font: 600 11.5px 'Inter', sans-serif;
      color: var(--texto);
      margin-bottom: 7px;
    }
    input[type=text],
    input[type=password] {
      width: 100%;
      height: 42px;
      padding: 0 14px;
      border: 1px solid var(--borda-forte);
      border-radius: 9px;
      background: var(--superficie-fraca);
      color: var(--texto-forte);
      font: 400 14px 'Inter', sans-serif;
      transition: border-color .15s, box-shadow .15s;
    }
    input[type=text]::placeholder,
    input[type=password]::placeholder { color: var(--texto-minimo); }
    input[type=text]:focus,
    input[type=password]:focus {
      outline: none;
      border-color: var(--azul);
      box-shadow: 0 0 0 3px rgba(76,141,255,.18);
    }
    button {
      cursor: pointer;
      border: none;
      border-radius: 9px;
      padding: 10px 18px;
      font: 700 13.5px 'Inter', sans-serif;
      transition: filter .15s, box-shadow .15s, transform .1s;
    }
    button.primario {
      background: var(--azul-gradiente);
      color: #fff;
      box-shadow: var(--azul-glow);
    }
    button.primario:hover { filter: brightness(1.08); box-shadow: 0 10px 28px -6px rgba(76,141,255,.6); }
    button.primario:disabled { opacity: .5; cursor: not-allowed; box-shadow: none; }
    button.secundario {
      background: var(--superficie-forte);
      color: var(--texto);
      border: 1px solid var(--borda-forte);
    }
    button.secundario:hover { background: rgba(255,255,255,.08); }
    .linha-botoes {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    /* botao de icone (ex: "voltar") - area de toque min. 44x44px
       (WCAG/Apple/Google) mesmo com o glifo sendo pequeno visualmente */
    .botao-icone {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      min-height: 44px;
      background: transparent;
      border: none;
      font-size: 1.1rem;
      border-radius: 8px;
      cursor: pointer;
      line-height: 1;
      color: var(--texto-suave);
      text-decoration: none;
      flex-shrink: 0;
    }
    .botao-icone:hover { background: var(--superficie); color: var(--texto); }
    .botao-icone svg { width: 18px; height: 18px; }
    .erro {
      background: var(--erro-bg);
      border: 1px solid var(--erro-borda);
      color: var(--erro-texto);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: .85rem;
      margin-bottom: 16px;
    }
    /* telas bem estreitas (celulares pequenos) - aproveita mais largura */
    @media (max-width: 380px) {
      .pagina { padding: 12px; }
      .cartao { padding: 24px 20px; }
    }
  </style>
  {% block estilo_extra %}{% endblock %}
</head>
<body>
  {% block conteudo %}{% endblock %}
</body>
</html>
