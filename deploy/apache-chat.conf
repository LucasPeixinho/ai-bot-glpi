# Chatbot GLPI - VirtualHost dedicado (subdominio chat.cdp.lub, mesmo IP do GLPI)
#
# Requer os modulos: proxy, proxy_http, headers
#   sudo a2enmod proxy proxy_http headers
#
# Instalar com:
#   sudo ln -s /opt/chatbot-glpi/deploy/apache-chat.conf /etc/apache2/sites-available/chatbot-glpi.conf
#   sudo a2ensite chatbot-glpi
#   sudo apache2ctl configtest
#   sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName chat.cdp.lub

    ProxyPreserveHost On

    # SSE (Server-Sent Events): flushpackets=on desliga o buffering do
    # mod_proxy pra essas respostas - sem isso o navegador so recebe os
    # eventos de streaming (chat, painel do tecnico) tudo de uma vez no final
    ProxyPass / http://127.0.0.1:8100/ flushpackets=on
    ProxyPassReverse / http://127.0.0.1:8100/

    ErrorLog ${APACHE_LOG_DIR}/chatbot-glpi-error.log
    CustomLog ${APACHE_LOG_DIR}/chatbot-glpi-access.log combined
</VirtualHost>
