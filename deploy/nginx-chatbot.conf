# Porta de entrada unica do servidor (192.168.0.241:80). Substitui o Apache
# como front door - o Apache do GLPI passa a escutar so em 127.0.0.1:8090
# (ver ports.conf/glpi.conf). Motivo: Apache usa mpm_prefork (exigido pelo
# mod_php do GLPI), que gasta 1 processo inteiro por conexao - as conexoes
# SSE do chat (minutos de duracao) esgotavam esse pool compartilhado com o
# GLPI. Aqui o chatbot fala direto com o uvicorn, sem passar pelo Apache.
#
# Instalar com:
#   sudo ln -s /opt/chatbot-glpi/deploy/nginx-chatbot.conf /etc/nginx/sites-available/chatbot-glpi.conf
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo ln -s /etc/nginx/sites-available/chatbot-glpi.conf /etc/nginx/sites-enabled/chatbot-glpi.conf
#   sudo nginx -t
# Ver deploy/instalar.sh para a ordem completa do cutover (Apache precisa
# soltar a porta 80 antes do nginx poder ocupar-la).

# GLPI - passthrough pro Apache interno (mod_php, DocumentRoot, Rewrite -
# tudo isso continua identico, so mudou a porta que o Apache escuta).
# "localhost" no server_name preserva GLPI_URL=http://localhost no .env do
# chatbot (chamadas internas da API) sem precisar mudar nada la.
server {
    listen 80;
    server_name suporte.cdp.lub suporte.cedep.com localhost;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Chatbot GLPI - direto pro FastAPI/uvicorn, sem Apache no meio.
server {
    listen 80;
    server_name chat.cdp.lub;

    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE: sem isso o nginx bufferiza a resposta de streaming e o
        # navegador so recebe tudo de uma vez no final (mesmo motivo do
        # flushpackets=on que usavamos no Apache).
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }
}

# Catch-all: qualquer Host nao cadastrado fecha sem resposta - nunca cai no
# GLPI nem no chatbot por acidente (foi exatamente esse tipo de fallback
# implicito que já causou um incidente real com o Apache antes).
server {
    listen 80 default_server;
    server_name _;
    return 444;
}
